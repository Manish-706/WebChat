<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebChat</title>
    <link rel="stylesheet" href="/styles/auth.css">
</head>

<body>
    <main class="welcome-shell">
        <section class="brand-panel">
            <img src="https://robohash.org/webchat-welcome.png?set=set4&size=160x160" alt="Cartoon animal avatar">
            <p class="eyebrow">WebChat</p>
            <h1>Real-time chats with a little personality.</h1>
            <p>Sign in, find your contacts, and keep the conversation moving with playful animal avatars.</p>
        </section>

        <section class="welcome-actions">
            <p class="eyebrow">Get started</p>
            <h1>Welcome back.</h1>
            <p class="form-copy">Continue your chats or create a new account in a few seconds.</p>
            <a class="button-link" href="/Login">Login</a>
            <a class="button-link secondary" href="/Register">Register</a>
        </section>
    </main>
</body>

</html>
